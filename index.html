<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台大醫院教學部 | AI行政提升計畫問卷</title>
    <!-- 使用 Tailwind CSS 打造現代感 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F9F7F2; /* 北歐米色底 */
            color: #334155;
        }

        .nordic-card {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid #D1CDC7;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .primary-green { color: #4A6741; }
        .bg-primary-green { background-color: #4A6741; }
        
        .rating-btn {
            transition: all 0.2s;
        }

        .rating-btn.active {
            background-color: #4A6741;
            color: white;
            border-color: #4A6741;
            transform: scale(1.1);
        }

        /* 讀取動畫 */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #4A6741;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <!-- Header 區塊 -->
        <header class="nordic-card p-8 mb-8 border-t-[10px] border-[#4A6741]">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="book-open" class="w-5 h-5 primary-green"></i>
                <span class="text-xs font-bold tracking-[0.2em] text-[#8C7A6B]">台大醫院教學部</span>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold mb-4 text-slate-800 leading-snug">
                【生成式AI製作電子書協助院內行政業務提升計畫】<br>
                <span class="primary-green">會議調查與需求投票</span>
            </h1>
            <p class="text-[#8C7A6B] text-sm leading-relaxed">
                本計畫旨在優化教學行政效率，請主管們填寫意願，並於會議時攜帶希望處理的「文本資料」，我們將與智慧醫療中心協作建模。
            </p>
        </header>

        <!-- 表單開始 -->
        <form id="surveyForm" class="space-y-6">
            
            <!-- A. 基本資料 -->
            <section class="nordic-card p-8">
                <div class="flex items-center gap-2 mb-6">
                    <i data-lucide="user" class="w-5 h-5 primary-green"></i>
                    <h2 class="text-lg font-bold primary-green">A. 基本資料</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">您的姓名</label>
                        <input type="text" name="name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-[#4A6741] outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">服務單位</label>
                        <input type="text" name="department" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-[#4A6741] outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">職稱</label>
                        <input type="text" name="title" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-[#4A6741] outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">生成式 AI 使用經驗</label>
                        <select name="aiExperience" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-[#4A6741] outline-none appearance-none">
                            <option value="">請選擇次數</option>
                            <option value="無">無</option>
                            <option value="有，1 次">有，1 次</option>
                            <option value="有，2–5 次">有，2–5 次</option>
                            <option value="有，>5 次">有，>5 次</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- B. 會議時間 -->
            <section class="nordic-card p-8">
                <div class="flex items-center gap-2 mb-4">
                    <i data-lucide="calendar" class="w-5 h-5 primary-green"></i>
                    <h2 class="text-lg font-bold primary-green">B. 會議時間選擇</h2>
                </div>
                <p class="text-xs text-slate-400 mb-6">地點：東址 3 樓教學部討論室一號（可複選所有方便的時間）</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <input type="checkbox" name="time" value="3/5(四)14:00" class="w-4 h-4 accent-[#4A6741] mr-3">
                        <span class="text-sm">3/5 (四) 14:00-15:00</span>
                    </label>
                    <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <input type="checkbox" name="time" value="3/6(五)14:00" class="w-4 h-4 accent-[#4A6741] mr-3">
                        <span class="text-sm">3/6 (五) 14:00-15:00</span>
                    </label>
                    <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <input type="checkbox" name="time" value="3/9(一)14:00" class="w-4 h-4 accent-[#4A6741] mr-3">
                        <span class="text-sm">3/9 (一) 14:00-15:00</span>
                    </label>
                    <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <input type="checkbox" name="time" value="3/11(三)14:00" class="w-4 h-4 accent-[#4A6741] mr-3">
                        <span class="text-sm">3/11 (三) 14:00-15:00</span>
                    </label>
                    <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <input type="checkbox" name="time" value="3/13(五)14:00" class="w-4 h-4 accent-[#4A6741] mr-3">
                        <span class="text-sm">3/13 (五) 14:00-15:00</span>
                    </label>
                    <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <input type="checkbox" name="time" value="3/16(一)14:00" class="w-4 h-4 accent-[#4A6741] mr-3">
                        <span class="text-sm">3/16 (一) 14:00-15:00</span>
                    </label>
                </div>
            </section>

            <!-- C. 需求類型 -->
            <section class="nordic-card p-8">
                <div class="flex items-center gap-2 mb-6">
                    <i data-lucide="bar-chart-3" class="w-5 h-5 primary-green"></i>
                    <h2 class="text-lg font-bold primary-green">C. 需求強度評估</h2>
                </div>

                <div class="space-y-10">
                    <!-- Q1 -->
                    <div>
                        <p class="text-sm text-slate-600 mb-4">1. 大量理解文本的工具，製作清楚正確的摘要</p>
                        <div class="flex justify-between max-w-xs mx-auto rating-group" data-target="need1">
                            <button type="button" data-val="1" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">1</button>
                            <button type="button" data-val="2" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">2</button>
                            <button type="button" data-val="3" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs active">3</button>
                            <button type="button" data-val="4" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">4</button>
                            <button type="button" data-val="5" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">5</button>
                        </div>
                    </div>
                    <!-- Q2 -->
                    <div>
                        <p class="text-sm text-slate-600 mb-4">2. 院內安全環境使用 AI，避免資料外洩</p>
                        <div class="flex justify-between max-w-xs mx-auto rating-group" data-target="need2">
                            <button type="button" data-val="1" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">1</button>
                            <button type="button" data-val="2" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">2</button>
                            <button type="button" data-val="3" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs active">3</button>
                            <button type="button" data-val="4" class="rating-btn w-10 h-10 rounded-full border border
