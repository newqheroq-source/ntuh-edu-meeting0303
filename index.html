<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台大醫院教學部 | AI行政提升計畫問卷</title>
    <!-- 使用 Tailwind CSS 打造現代感 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F9F7F2; /* 北歐米色底 */
            color: #334155;
        }

        .nordic-card {
            background: white;
            border-radius: 1.5rem;
            border: 1px solid #D1CDC7;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .primary-green { color: #4A6741; }
        .bg-primary-green { background-color: #4A6741; }
        
        .rating-btn {
            transition: all 0.2s;
        }

        .rating-btn.active {
            background-color: #4A6741;
            color: white;
            border-color: #4A6741;
            transform: scale(1.1);
        }

        /* 讀取動畫 */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #4A6741;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <!-- Header 區塊 -->
        <header class="nordic-card p-8 mb-8 border-t-[10px] border-[#4A6741]">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="book-open" class="w-5 h-5 primary-green"></i>
                <span class="text-xs font-bold tracking-[0.2em] text-[#8C7A6B]">台大醫院教學部</span>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold mb-4 text-slate-800 leading-snug">
                【生成式AI製作電子書協助院內行政業務提升計畫】<br>
                <span class="primary-green">會議調查與需求投票</span>
            </h1>
            <p class="text-[#8C7A6B] text-sm leading-relaxed">
                本計畫旨在優化教學行政效率，請主管們填寫意願，並於會議時攜帶希望處理的「文本資料」，我們將與智慧醫療中心協作建模。
            </p>
        </header>

        <!-- 表單開始 -->
        <form id="surveyForm" class="space-y-6">
            
            <!-- A. 基本資料 -->
            <section class="nordic-card p-8">
                <div class="flex items-center gap-2 mb-6">
                    <i data-lucide="user" class="w-5 h-5 primary-green"></i>
                    <h2 class="text-lg font-bold primary-green">A. 基本資料</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">您的姓名</label>
                        <input type="text" name="name" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-[#4A6741] outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">服務單位</label>
                        <input type="text" name="department" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-[#4A6741] outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">職稱</label>
                        <input type="text" name="title" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-[#4A6741] outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-medium text-slate-400 mb-1 ml-1">生成式 AI 使用經驗</label>
                        <select name="aiExperience" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-1 focus:ring-[#4A6741] outline-none appearance-none">
                            <option value="">請選擇次數</option>
                            <option value="無">無</option>
                            <option value="有，1 次">有，1 次</option>
                            <option value="有，2–5 次">有，2–5 次</option>
                            <option value="有，>5 次">有，>5 次</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- B. 會議時間 -->
            <section class="nordic-card p-8">
                <div class="flex items-center gap-2 mb-4">
                    <i data-lucide="calendar" class="w-5 h-5 primary-green"></i>
                    <h2 class="text-lg font-bold primary-green">B. 會議時間選擇</h2>
                </div>
                <p class="text-xs text-slate-400 mb-6">地點：東址 3 樓教學部討論室一號（可複選所有方便的時間）</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <input type="checkbox" name="time" value="3/5(四)14:00" class="w-4 h-4 accent-[#4A6741] mr-3">
                        <span class="text-sm">3/5 (四) 14:00-15:00</span>
                    </label>
                    <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <input type="checkbox" name="time" value="3/6(五)14:00" class="w-4 h-4 accent-[#4A6741] mr-3">
                        <span class="text-sm">3/6 (五) 14:00-15:00</span>
                    </label>
                    <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <input type="checkbox" name="time" value="3/9(一)14:00" class="w-4 h-4 accent-[#4A6741] mr-3">
                        <span class="text-sm">3/9 (一) 14:00-15:00</span>
                    </label>
                    <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <input type="checkbox" name="time" value="3/11(三)14:00" class="w-4 h-4 accent-[#4A6741] mr-3">
                        <span class="text-sm">3/11 (三) 14:00-15:00</span>
                    </label>
                    <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <input type="checkbox" name="time" value="3/13(五)14:00" class="w-4 h-4 accent-[#4A6741] mr-3">
                        <span class="text-sm">3/13 (五) 14:00-15:00</span>
                    </label>
                    <label class="flex items-center p-4 border border-slate-100 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                        <input type="checkbox" name="time" value="3/16(一)14:00" class="w-4 h-4 accent-[#4A6741] mr-3">
                        <span class="text-sm">3/16 (一) 14:00-15:00</span>
                    </label>
                </div>
            </section>

            <!-- C. 需求類型 -->
            <section class="nordic-card p-8">
                <div class="flex items-center gap-2 mb-6">
                    <i data-lucide="bar-chart-3" class="w-5 h-5 primary-green"></i>
                    <h2 class="text-lg font-bold primary-green">C. 需求強度評估</h2>
                </div>

                <div class="space-y-10">
                    <!-- Q1 -->
                    <div>
                        <p class="text-sm text-slate-600 mb-4">1. 大量理解文本的工具，製作清楚正確的摘要</p>
                        <div class="flex justify-between max-w-xs mx-auto rating-group" data-target="need1">
                            <button type="button" data-val="1" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">1</button>
                            <button type="button" data-val="2" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">2</button>
                            <button type="button" data-val="3" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs active">3</button>
                            <button type="button" data-val="4" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">4</button>
                            <button type="button" data-val="5" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">5</button>
                        </div>
                    </div>
                    <!-- Q2 -->
                    <div>
                        <p class="text-sm text-slate-600 mb-4">2. 院內安全環境使用 AI，避免資料外洩</p>
                        <div class="flex justify-between max-w-xs mx-auto rating-group" data-target="need2">
                            <button type="button" data-val="1" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">1</button>
                            <button type="button" data-val="2" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">2</button>
                            <button type="button" data-val="3" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs active">3</button>
                            <button type="button" data-val="4" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">4</button>
                            <button type="button" data-val="5" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">5</button>
                        </div>
                    </div>
                    <!-- Q3 -->
                    <div>
                        <p class="text-sm text-slate-600 mb-4">3. 將複雜文本轉成電子書或簡報</p>
                        <div class="flex justify-between max-w-xs mx-auto rating-group" data-target="need3">
                            <button type="button" data-val="1" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">1</button>
                            <button type="button" data-val="2" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">2</button>
                            <button type="button" data-val="3" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs active">3</button>
                            <button type="button" data-val="4" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">4</button>
                            <button type="button" data-val="5" class="rating-btn w-10 h-10 rounded-full border border-slate-200 text-xs">5</button>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-dashed border-slate-200">
                        <label class="block text-sm font-medium text-slate-400 mb-2">4. 其他具體需求或建議</label>
                        <textarea name="other" rows="3" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-[#4A6741] resize-none" placeholder="請填寫您的想法..."></textarea>
                    </div>
                </div>
            </section>

            <button type="submit" id="submitBtn" class="w-full bg-[#4A6741] text-white py-4 rounded-full font-bold shadow-lg hover:opacity-90 transition-all transform active:scale-95">
                提交問卷回覆
            </button>
        </form>

        <!-- 成功 Modal -->
        <div id="successModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
            <div class="bg-white p-10 rounded-3xl max-w-sm w-full text-center shadow-2xl">
                <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="check" class="w-8 h-8 text-[#4A6741]"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">回覆已成功送出</h3>
                <p class="text-slate-400 text-sm mb-8">感謝您的參與，會議確認後將會發送通知。</p>
                <button onclick="location.reload()" class="w-full py-3 bg-[#4A6741] text-white rounded-full font-bold">返回問卷</button>
            </div>
        </div>
    </div>

    <script>
        // 初始化 Lucide 圖示
        lucide.createIcons();

        // 評分按鈕互動邏輯
        const ratings = { need1: 3, need2: 3, need3: 3 };
        document.querySelectorAll('.rating-group').forEach(group => {
            const btns = group.querySelectorAll('.rating-btn');
            const target = group.dataset.target;
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    ratings[target] = btn.dataset.val;
                });
            });
        });

        const form = document.getElementById('surveyForm');
        const submitBtn = document.getElementById('submitBtn');
        
        // 使用您最新的 GAS 部署網址
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbw4Gmuv_864Xt18AGKQoWgyEU0XrDzZZEUIvOET6HGNoPTSA7yaS71MneFD03bwF1Ga/exec';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 設定讀取狀態
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span> 傳送中...';

            const formData = new FormData(form);
            const times = [];
            form.querySelectorAll('input[name="time"]:checked').forEach(cb => times.push(cb.value));

            // 構建傳送資料 (對應 Canvas 中 GAS 腳本的 rowData 順序)
            const payload = {
                timestamp: new Date().toLocaleString('zh-TW', { hour12: false }),
                name: formData.get('name'),
                department: formData.get('department'),
                title: formData.get('title'),
                aiExperience: formData.get('aiExperience'),
                time: times.join(', '),
                need1: ratings.need1,
                need2: ratings.need2,
                need3: ratings.need3,
                other: formData.get('other')
            };

            try {
                // 使用 fetch 發送到 GAS
                // 註：GAS POST 在 mode: 'no-cors' 下回傳結果會是隱藏的，但資料能成功寫入
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // 顯示成功彈窗
                document.getElementById('successModal').classList.remove('hidden');
            } catch (err) {
                console.error('Error:', err);
                alert('傳送時發生預期外錯誤，請確認網路連線或聯絡資訊管理員。');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '提交問卷回覆';
            }
        });
    </script>
</body>
</html>
